publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  dio: ^5.9.0
  file_picker: ^10.3.2
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.0.3
  freezed_annotation: ^3.1.0
  go_router: ^16.2.1
